name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.go-version.outputs.value }}
      golangci-lint: ${{ steps.golangci-lint-version.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: hudsonm62/toml-action@14f8558e5c72f7c3e4d3aeb0745587f22bb2c9bb
        id: go-version
        with:
          file: mise.toml
          field: tools.go
      - uses: hudsonm62/toml-action@14f8558e5c72f7c3e4d3aeb0745587f22bb2c9bb
        id: golangci-lint-version
        with:
          file: mise.toml
          field: tools.golangci-lint

  lint:
    needs: versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - &checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - &setup-go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ needs.versions.outputs.go }}
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v${{ needs.versions.outputs.golangci-lint }}

  test:
    needs: versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - *checkout
      - *setup-go
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
      - name: Test
        run: task test
      - name: Coverage
        run: task covercheck

  build:
    needs: [versions, lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - *checkout
      - *setup-go
      - name: Build
        run: go build ./...

  release:
    runs-on: ubuntu-latest
    needs: [versions, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - *checkout
      - *setup-go
      - uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f
        with:
          allow-initial-development-versions: true
          hooks: goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
