version: "3"

vars:
  COVEROUT: cover.out
  GOBIN: $(go env GOPATH)/bin
  TEST_COVERAGE: 100

tasks:
  lint:
    summary: Lint code
    cmds:
      - go mod tidy -diff
      - golangci-lint run ./...
      - prettier --check .

  test:
    summary: Run tests
    cmd: go test ./... -race -coverprofile={{.COVEROUT}} -covermode=atomic

  coverage:
    summary: Generate test coverage
    cmds:
      - task: test
        vars:
          CLI_ARGS: -coverprofile={{.COVEROUT}} -covermode=atomic -coverpkg=./...
    generates:
      - "{{.COVEROUT}}"

  covercheck:
    summary: Check test coverage
    deps: [coverage]
    cmd: |
      go tool cover -func={{.COVEROUT}} | \
      awk '/total/{gsub(/%/,"",$3); print "Coverage: " $3 "% (Minimum: {{.TEST_COVERAGE}}%)"; if ($3 < {{.TEST_COVERAGE}}) exit 1}'

  ci:
    summary: Run CI checks (lint, test, coverage)
    deps: [lint, covercheck]

  clean:
    summary: Clean the project
    cmds:
      - go clean
      - rm -f {{.COVEROUT}}

  fixlint:
    summary: Fix lint issues
    cmd: golangci-lint run --fix ./...

  fmt:
    summary: Format the code
    cmds:
      - golangci-lint fmt ./...
      - prettier --write .

  tidy:
    summary: Tidy the module
    cmd: go mod tidy -v
